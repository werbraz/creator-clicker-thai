<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ครีเอเตอร์คลิกเกอร์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon: '#a855f7',
            darkBg: '#0f172a',
            glass: 'rgba(255, 255, 255, 0.1)',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-darkBg text-white min-h-screen flex flex-col font-sans overflow-x-hidden md:overflow-hidden">
  <!-- Header: Stats -->
  <header
    class="p-4 md:p-6 border-b border-white/10 flex flex-col md:flex-row justify-between items-center backdrop-blur-md bg-white/5 z-10 w-full shadow-lg gap-4 md:gap-0 relative">
    <div class="text-center md:text-left">
      <h1
        class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 neon-text-glow leading-tight pb-1">
        ครีเอเตอร์คลิกเกอร์</h1>
      <p class="text-xs md:text-sm text-gray-400 mt-0.5">เริ่มต้นเส้นทางสู่ 1 ล้านซับสไครบ์เบอร์</p>
    </div>
    <div
      class="flex gap-4 md:gap-8 items-center bg-black/30 p-3 md:p-4 rounded-2xl border border-white/5 shadow-inner w-full md:w-auto justify-around relative z-20">
      <div class="flex flex-col items-center">
        <span class="text-xs text-gray-400 uppercase tracking-widest font-bold">ยอดวิวรวม</span>
        <span id="total-views" class="text-3xl font-bold text-white tracking-tight shrink-0 flex items-center gap-2">
          <i class="fa-solid fa-eye text-purple-400 text-xl"></i> 0
        </span>
      </div>
      <div class="w-px h-10 bg-white/10"></div>
      <div class="flex flex-col items-center">
        <span class="text-xs text-gray-400 uppercase tracking-widest font-bold">วิว / วินาที</span>
        <span id="views-per-sec" class="text-3xl font-bold text-gray-200 shrink-0 flex items-center gap-2">
          <i class="fa-solid fa-bolt text-yellow-400 text-xl"></i> 0
        </span>
      </div>
      <div class="w-px h-10 bg-white/10"></div>
      <div class="flex flex-col items-center">
        <span class="text-xs text-pink-400 uppercase tracking-widest font-bold">ผู้ติดตาม</span>
        <span id="total-subs" class="text-3xl font-bold text-pink-500 shrink-0 flex items-center gap-2">
          <i class="fa-solid fa-users text-pink-400 text-xl"></i> 0
        </span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col md:flex-row overflow-x-hidden md:overflow-hidden relative z-0">

    <!-- Left Panel: Clicker Area -->
    <section class="flex-1 flex flex-col items-center justify-center p-6 md:p-8 relative min-h-[50vh] md:min-h-0"
      id="clicker-area">
      <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-20">
        <div class="w-96 h-96 bg-purple-600 rounded-full blur-[100px] mix-blend-screen"></div>
      </div>

      <button id="main-click-btn"
        class="relative group outline-none focus:outline-none transition-transform duration-100 ease-out z-10">
        <div
          class="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-full blur-xl opacity-50 group-hover:opacity-100 group-active:opacity-80 transition-opacity">
        </div>
        <div
          class="w-48 h-48 md:w-64 md:h-64 bg-slate-800 rounded-full border-4 border-purple-500/50 shadow-[0_0_50px_rgba(168,85,247,0.4)] flex items-center justify-center relative overflow-hidden group-hover:scale-105 group-active:scale-95 transition-transform duration-200">
          <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>
          <i
            class="fa-solid fa-camera-retro text-5xl md:text-7xl text-white group-hover:text-purple-200 group-active:scale-90 transition-all"></i>
        </div>
        <!-- Dynamic floating texts will be appended here via JS -->
      </button>
      <p class="mt-8 md:mt-12 text-gray-400 text-sm md:text-lg">คลิกที่กล้องเพื่ออัปโหลดวิดีโอ!</p>
      <p
        class="mt-2 text-xs md:text-sm text-purple-300 bg-purple-900/40 px-4 py-1 rounded-full border border-purple-500/30">
        <span id="click-power">1</span> วิว / คลิก
      </p>
    </section>

    <!-- Right Panel: Upgrades -->
    <section
      class="w-full md:w-1/3 min-w-0 md:min-w-[350px] max-w-none md:max-w-md bg-white/5 border-t md:border-t-0 md:border-l border-white/10 flex flex-col backdrop-blur-sm z-10 md:shadow-[-10px_0_30px_rgba(0,0,0,0.5)] h-[50vh] md:h-auto">
      <div class="p-4 md:p-6 border-b border-white/10 bg-black/20 sticky top-0 z-20">
        <h2 class="text-2xl font-bold flex items-center gap-3">
          <i class="fa-solid fa-arrow-up-right-dots text-purple-400"></i> อัปเกรด
        </h2>
        <p class="text-sm text-gray-400 mt-1">ลุงทุนด้วยยอดวิวเพื่อเติบโตช่องของคุณ</p>
      </div>

      <div id="upgrades-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
        <!-- Upgrades will be injected here via JS -->
      </div>
    </section>
  </main>

  <!-- Floating Number Template (Hidden) -->
  <template id="floating-text-template">
    <div
      class="floating-text absolute cursor-default pointer-events-none text-2xl font-bold text-white drop-shadow-[0_0_8px_rgba(168,85,247,0.8)] z-50">
    </div>
  </template>

  <script src="main.js"></script>
</body>

</html>
